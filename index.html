<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Choice Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div class="hero__top">
        <div>
          <p class="hero__kicker">District Cutoff Finder v2.0</p>
          <h1>Find Suitable Courses by Score, Stream, and District</h1>
          <p class="hero__copy">
            Choose your score, subject stream, and district to see programs where your score meets the district cutoff.
          </p>
        </div>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false">
          Switch to Dark Mode
        </button>
      </div>
    </header>

    <section class="panel panel--form" aria-labelledby="search-title">
      <h2 id="search-title">Search Inputs</h2>
      <form id="search-form" class="search-form">
        <label>
          Score
          <input id="score" name="score" type="number" min="-1.0" step="0.001" value="0.0000" required>
        </label>

        <label>
          Subject Stream
          <select id="subject-stream" name="subjectStream" required></select>
        </label>

        <label>
          District
          <select id="district" name="district" required></select>
        </label>

        <button type="submit">Run Search</button>
      </form>
    </section>

    <section class="panel panel--results" aria-labelledby="results-title">
      <div class="panel__heading">
        <h2 id="results-title">Search Results</h2>
        <p id="result-summary" class="result-summary"></p>
      </div>
      <div id="results" class="results" aria-live="polite"></div>
    </section>
  </main>

  <script src="course-data.js"></script>
  <script src="script.js"></script>
</body>
</html>
